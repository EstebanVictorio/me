<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="typography.css" />
    <link rel="stylesheet" href="palette.css" />
    <link rel="stylesheet" href="norm.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
  </head>
  <body class="light">
    <header class="hero">
      <figure class="profile-pic__container">
        <img class="profile-pic" src="" alt="" srcset="profile-pic.jpeg" />
      </figure>
    </header>
    <header class="hero__headings">
      <h1 class="name">Esteban Victorio</h1>
      <h2 class="current-role">Front-End Engineer</h2>
      <h3 class="what-i-do">Coding. Reading. Gaming.</h3>
    </header>
    <main>
      <ul class="hex__grid-list">
        <li class="hex__grid-list-item">
          <div class="hex__container">
            <div class="hex">
              <i class="icon-twitter"></i>
            </div>
          </div>
          <div class="hex__container">
            <div class="hex hex--tainted">
              <i class="icon-gmail"></i>
            </div>
          </div>
          <div class="hex__container">
            <div class="hex hex--tainted">
              <i class="icon-whatsapp"></i>
            </div>
          </div>
        </li>
        <li class="hex__grid-list-item hex__grid-list-item--tainted">
          <div class="hex__container">
            <div class="hex">
              <i class="icon-github"></i>
            </div>
          </div>
          <div class="hex__container">
            <div class="hex hex--tainted">
              <i class="icon-linkedin"></i>
            </div>
          </div>
        </li>
      </ul>
    </main>
  </body>
</html>
